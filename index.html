<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mountain Runner</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Arial,sans-serif;
}

#game{
width:100vw;
height:100vh;
background:url('mountain.jpg') center center/cover no-repeat;
position:relative;
overflow:hidden;
}

#score{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px 15px;
border-radius:10px;
font-size:22px;
font-weight:bold;
z-index:100;
}

#topscore{
position:absolute;
top:65px;
left:10px;
background:white;
padding:10px 15px;
border-radius:10px;
font-size:20px;
font-weight:bold;
z-index:100;
}

#message{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:38px;
font-weight:bold;
color:white;
text-shadow:2px 2px 5px black;
z-index:100;
}

#road{
position:absolute;
bottom:40px;
width:100%;
height:180px;
background:
repeating-linear-gradient(
90deg,
#9b6b3d 0px,
#9b6b3d 50px,
#6e4725 50px,
#6e4725 55px
);
border-top:8px solid #5a3518;
box-shadow: inset 0 8px 15px rgba(0,0,0,0.3);
z-index:1;
}

#character{
position:absolute;
left:80px;
bottom:220px;
width:90px;
z-index:10;
}

#bike{
position:absolute;
bottom:220px;
width:130px;
z-index:9;
}
</style>
</head>

<body>

<div id="game">

<div id="score">Score: 0</div>
<div id="topscore">Top Score: 0</div>

<div id="message">Tap To Start</div>

<img src="character.png" id="character">
<img src="bike.png" id="bike">

<div id="road"></div>

</div>

<audio id="startSound" src="start.mp3"></audio>
<audio id="gameOverSound" src="gameover.mp3"></audio>

<script>

const character=document.getElementById("character");
const bike=document.getElementById("bike");

const scoreText=document.getElementById("score");
const topText=document.getElementById("topscore");
const message=document.getElementById("message");

const startSound=document.getElementById("startSound");
const gameOverSound=document.getElementById("gameOverSound");

let started=false;
let jumping=false;
let score=0;
let speed=8;

let topScore=localStorage.getItem("topScore") || 0;
topText.innerHTML="Top Score: "+topScore;

function startGame(){
if(started) return;
started=true;
message.style.display="none";
startSound.play();
}

function jump(){

if(jumping) return;

jumping=true;

let pos=220;

let up=setInterval(()=>{

if(pos>=400){

clearInterval(up);

let down=setInterval(()=>{

if(pos<=220){
clearInterval(down);
jumping=false;
}

pos-=8;
character.style.bottom=pos+"px";

},15);
}

pos+=8;
character.style.bottom=pos+"px";

},15);
}

document.addEventListener("click",()=>{
if(!started) startGame();
jump();
});

document.addEventListener("touchstart",()=>{
if(!started) startGame();
jump();
});

let bikePos=window.innerWidth;

setInterval(()=>{

if(!started) return;

bikePos-=speed;
bike.style.left=bikePos+"px";

if(bikePos<-150){

bikePos=window.innerWidth;

score++;

scoreText.innerHTML="Score: "+score;

if(score>topScore){

topScore=score;

localStorage.setItem("topScore",topScore);

topText.innerHTML="Top Score: "+topScore;
}

if(score%5===0){
speed+=0.5;
}
}

const charRect=character.getBoundingClientRect();
const bikeRect=bike.getBoundingClientRect();

if(
charRect.right>bikeRect.left+20 &&
charRect.left<bikeRect.right-20 &&
charRect.bottom>bikeRect.top+20
){

gameOverSound.play();

setTimeout(()=>{
alert("Game Over! Score: "+score);
location.reload();
},300);

}

},20);

</script>

</body>
</html>
